name: R-CMD-check (Full CRAN emulation)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      LC_ALL: C
      _R_CHECK_CRAN_INCOMING_REMOTE_: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # Install hard deps (Imports/Depends/LinkingTo) + testthat for running
      # tests. Suggests are otherwise excluded because cmdstanr is not on CRAN
      # and pak cannot resolve it without a special repository.
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::knitr, any::rmarkdown
          dependencies: '"hard"'

      # compileAttributes() is called by rstantools::rstan_config() during
      # R CMD INSTALL (via configure/configure.win). Run it explicitly here so
      # any "Unable to parse C++ default value" warnings surface as CI failures
      # rather than only appearing on the CRAN submission server.
      - name: Check Rcpp attributes (no parse warnings)
        shell: Rscript {0}
        run: |
          withCallingHandlers(
            Rcpp::compileAttributes("."),
            warning = function(w) stop("compileAttributes() warning: ", conditionMessage(w))
          )

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          # Inner quotes required: YAML passes a bare word; R needs a string.
          # "warning" not "note": 2 expected CRAN notes (size, GNU make).
          error-on: '"warning"'
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
          # --run-donttest omitted: donttest examples need CmdStan / rstan
          # which CRAN check machines do not guarantee.
          args: 'c("--no-manual", "--as-cran")'
